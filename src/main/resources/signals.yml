# =====================================================
#  MyCosmo — Источники сигналов / Signal Sources
#
#  Каждый источник:
#    name: <строка — отображаемое имя>
#    encrypted: <true/false — сигнал зашифрован, качество будет "Ужасное">
#    rare_chance: <0–1000 — шанс выпадения (1000 = 1/1000)>
#                 Если не указан — обычный случайный выбор.
#    value_bonus: <число — прибавка к стоимости дискеты в валюте>
#    messages:    <список строк — случайное сообщение при чтении дискеты>
#
#  Ключ (например "SUN") — используется внутренне как идентификатор.
#  Вы можете добавлять новые источники, не меняя Java-код.
# =====================================================

sources:

  SUN:
    name: "Солнце"
    messages:
      - "Слышен громкий шум и бурление"
      - "Слышны равномерные пульсации"
      - "Доносится низкочастотный гул"
      - "Бесконечный, всепроникающий гул конвективных ячеек, миллионами гранул вздымающих плазму из глубин…"
      - "Низкий, утробный рокот термоядерного горения, эхом отдающийся сквозь зоны лучистого переноса…"
      - "Ослепительный, разрывающийся треск солнечных вспышек, выбрасывающих магнитные петли в корону…"
      - "Свистящий, пронизывающий шёпот корональных дыр, испускающих ускоренный солнечный ветер…"
      - "Ритмичное, пульсирующее биение гелиосейсмических волн — сердце звезды, отбивающее такт пятиминутных осцилляций…"
      - "Глухой, раскатистый гром выбросов массы, летящих сквозь гелиосферу искажённым эхом…"
      - "Жаркий, пересыпающийся перезвон нановспышек, танцующих в паутине магнитных трубок…"
      - "Убаюкивающий, почти осязаемый инфразвук хромосферной сетки, вибрирующей от ударных волн…"
      - "Сквозь рокот горения и треск вспышек вдруг проступает ясный, пробирающий до ядра шёпот: «я — источник. я дал вам свет, и я позову вас обратно…»…"
      - "Вечное, золотое гудение — само дыхание жизни, из которого рождаются все остальные звуки, и в котором они когда-нибудь утонут…"

  MERCURY:
    name: "Меркурий"
    messages:
      - "Слабо различимый хруст охлаждающейся породы…"
      - "Глухой, медленный стон приливных деформаций…"
      - "Едва уловимое гудение намагниченных пылевых вихрей…"
      - "Сухой стеклянный перезвон реголита под солнечным ветром…"
      - "Ритмичное пощелкивание — звук расширения кратера на рассвете…"
      - "Томный, почти вязкий шорох: испарение летучих солей…"

  VENUS:
    name: "Венера"
    messages:
      - "Глухой, удушающий рев сверхзвукового ветра на границе кислотных облаков…"
      - "Бесконечный, влажный хруст углекислотного тумана, обтекающего скалы…"
      - "Тяжёлые, маслянистые вздохи — дыхание серных гейзеров в низинах…"
      - "Приглушённый, почти металлический звон: дождь из расплавленного свинца и серы барабанит по базальту…"
      - "Вязкий электрический треск ползучих микроразрядов в толще ядовитой атмосферы…"
      - "Медленные, утробные раскаты — грохот обваливающихся вулканических куполов, поглощаемый давлением…"
      - "Ускользающий, змеиный шёпот: коррозия, поедающая остатки лопнувших зондов…"

  MARS:
    name: "Марс"
    messages:
      - "Бесконечный, шуршащий шёпот пыли, скользящей по бескрайним равнинам…"
      - "Низкий, басовитый гул разреженного ветра, огибающего застывшие дюны…"
      - "Сухой треск электричества, мечущегося внутри пылевого дьявола…"
      - "Приглушённый стеклянный хруст: корка углекислого инея лопается на рассвете…"
      - "Утробный, долгий скрежет марсотрясения, отдающийся в лабиринтах каньонов…"
      - "Едва уловимое гудение: поток заряженных песчинок, электризующих посадочные опоры…"
      - "Свистящий, колючий шорох — мелкая позёмка течёт по склону потухшего вулкана…"
      - "Мерное, ритмичное пощёлкивание остывающих скал в тенях захода…"
      - "Глухое шипение сублимирующих ледников на дне ударных кратеров…"
      - "Звенящая, ускользающая тишина, нарушаемая лишь падением одинокой песчинки…"
      - "Среди свистящих и глухих шипений слышен едва уловимая фраза:'я огурчик рик...'"

  JUPITER:
    name: "Юпитер"
    messages:
      - "Бесконечный, нарастающий гул водородного урагана, рвущегося сквозь слои металлической жидкости…"
      - "Низкий, вибрирующий рокот Большого Красного Пятна, веками вращающего свой антициклонический зев…"
      - "Ослепительный треск сверхмолний, пробуждающих аммиачные тучи и оставляющих за собой остывающее эхо…"
      - "Ускользающий, басовитый свист радиоволн, рожденных эмиссией в радиационных поясах…"
      - "Глухой, заворачивающийся в себя стон полярного сияния, пляшущего на частотах магнитосферы…"
      - "Ритмичное, глубокое пощёлкивание: термическая турбулентность в зонах белых овалов отбивает свой космический ритм…"
      - "Шипящий, многослойный шёпот мелких ледяных кристаллов, непрерывно трущихся в высотной дымке…"
      - "Тяжёлые, властные раскаты инфразвука от гравитационного сжатия, заставляющие чувствовать глубину…"
      - "Среди басовитого свиста и треска сверхмолний вдруг прорезается искажённое, почти электронное: 'все эти миры принадлежат вам…'…"
      - "Монотонный, вневременной гул: дыхание планеты-гиганта, в котором тонут и фраза, и сама мысль о тишине…"

  SATURN:
    name: "Сатурн"
    messages:
      - "Мерный, завораживающий шорох мириад ледяных частиц, трущихся в плоскостях колец…"
      - "Бездонный, разлитый по всему экватору гул гелиевого ветра, дующего почти в полторы тысячи километров в час…"
      - "Электрический, пересыпающийся треск спицевых образований, левитирующих над кольцом B под действием статики…"
      - "Низкое, тягучее дыхание полярного гексагона, вибрирующего стоячей волной в толще облаков…"
      - "Приглушённый, хрустальный перезвон: микрометеориты прошивают плоскость колец, заставляя льдинки петь…"
      - "Глухой, раскатистый рокот грозовых фронтов Белых Пятен, вспыхивающих раз в тридцать лет…"
      - "Убаюкивающий, почти осязаемый инфразвук: радиоэмиссия полярных сияний взаимодействует с солнечным ветром…"
      - "Тонкое, стрекочущее эхо — криовулканы Энцелада выбрасывают струи, ионизирующиеся в магнитосфере…"
      - "Среди хрустального перезвона и раскатов вдруг проступает искажённый, будто сквозь жидкий гелий, шёпот: 'мы наблюдали за вами с колец…'…"
      - "Вечный, успокаивающий белый шум — планета-гигант мягко обволакивает пространство, и в этом шуме тонет всё…"

  URANUS:
    name: "Уран"
    messages:
      - "Бесконечный, монотонный гул метановых ветров, обтекающих планету, лежащую на боку…"
      - "Низкое, глубинное гудение наклонённой магнитосферы, вращающейся штопором вокруг оси…"
      - "Тонкий, почти ультразвуковой перезвон тёмных колец, резонирующих от ударов невидимых лун…"
      - "Влажный, удушливый шёпот аммиачно-водяной дымки, оседающей инеем на облачных палубах…"
      - "Мерный, пульсирующий треск электрических разрядов, пробегающих сквозь слои углеводородной мглы…"
      - "Глухой, раскатистый рокот полярных сияний, танцующих на полюсах, где Солнце не заходит по сорок два года…"
      - "Хрустящий, ледяной скрежет: кристаллы метана трутся друг о друга в высотных струйных течениях…"
      - "Ускользающий, басовитый свист солнечного ветра, захваченного асимметричной магнитосферой…"
      - "Внезапный, низвергающийся грохот сезонного сверхшторма, пробуждающегося раз в уранианский год…"
      - "Сквозь монотонный гул и перезвон колец вдруг проступает искажённый, будто из глубины ледяного сна, шёпот: 'мы ждали вас, лёжа на боку, целую вечность…'…"

  NEPTUNE:
    name: "Нептун"
    messages:
      - "Бесконечный, стонущий вой рекордных ветров, разрывающих метановые облака и превосходящих скорость звука…"
      - "Глухой, нарастающий гул Большого Тёмного Пятна, бушующего вихрем в южном полушарии…"
      - "Низкий, басовитый рокот внутреннего тепла, поднимающегося из глубин, где алмазный дождь стучит по ядру…"
      - "Ускользающий, почти шипящий шёпот азотных кристаллов, трущихся в разреженных кольцах Адамс и Леверье…"
      - "Пронизывающий электрический треск сверхмолний, вспыхивающих под давлением водородно-гелиевой атмосферы…"

  OTTOMAN_RELAY:
    name: "Османский ретранслятор"
    messages:
      - "Слабое потрескивание пыли на поверхности — как память о первых ударах по границам молодой державы и о днях, когда государственность только обретала форму…"
      - "В радиоэхе слышится сухой шорох бумаги и рваный звон металла — следы старых внутренних смут, давно ушедших в архивы истории…"
      - "Низкий, ровный фон несёт отпечаток первых конституционных дней: система старейшин исчезла, но её интонация ещё долго держалась в шуме…"
      - "Мерный гул, похожий на работу цехов, хранит память об индустриальном рывке, когда из мастерских выросли заводы и кабели стали привычнее камня…"
      - "В глубине спектра проступает тонкий, сухой треск буровых механизмов — отзвук времени, когда Вестфалия научилась добывать ресурсы не только из шахт, но и из самой истории…"
      - "Сигнал на миг становится чище, и в нём слышится отголосок парламентских стен — уже восстановленных после тех дней, когда они были разрушены и заново подняты…"
      - "Короткий всплеск помех похож на след дипломатических переговоров, в которых старые вражды впервые уступили место договорам и торговым путям…"
      - "Шорох затихает, но спектр ещё долго хранит следы прежних бурь — гражданских, внешних и тех, что закончились уже давно, оставив только форму тишины…"
      - "На самом краю слышимости остаётся спокойный, архивный тон, будто сам объект просто фиксирует: всё это уже было, и именно поэтому не исчезло окончательно…"

  SPUTINK:
    name: "Спутник Вестфалии"
    value_bonus: 5
    messages:
      - "Прерывистый, растворяющийся в вакууме гул — эхо выборных речей, застывшее в ионосфере над опустевшим Изумрудоградом…"
      - "Мерный, глуховатый стук, похожий на удары молота по стали: отголоски первых фабрик, когда-то ковавших тостеры…"
      - "Шёпот помех, сквозь который пробиваются искажённые лозунги гражданской войны и треск динамита у здания государственного суда…"
      - "Тонкий, звенящий писк: ультиматум Османской Империи, навсегда отражённый от ионосферы и превратившийся в радиошум…"
      - "Ритмичное, почти механическое потрескивание — следы индустриализации, запустившей буры и заводы, чей гул давно стих…"
      - "Глухой, раскатистый грохот, замерший в линиях магнитного поля: последняя битва сербских дружинников за столицу Вестфалии…"
      - "Шипящий, переливающийся шорох — перехваченные фрагменты переговоров о золотых яблоках и зачарованиях, так и не попавших к османам…"
      - "Сквозь гул и шёпот пробивается едва различимая, искажённая временем фраза: «…конституция была лишь началом, но где теперь все вы…»…"
      - "Вечное, спокойное гудение — пульс покинутого мира, где остались лишь затухающие сигналы спутника и память о том, что Республика Вестфалия была…"
      - "Среди еле различных шумов, было оставлено сообщение:'нужен доброволец для автоматизации фермы пороха в риверстоуне!'"
      - "На фоне слабого гула внезапно возникает бодрый голос: «если вы слышите это сообщение — налоги всё ещё обязательны»…"

  PLUTO:
    name: "Плутон"
    value_bonus: 3
    messages:
      - "Бесконечный, тихий шорох сублимирующего азотного льда, перетекающего по равнинам Спутника под тусклым Солнцем…"
      - "Низкий, уходящий в инфразвук гул разреженного ветра, обтекающего хребты из водяного льда…"
      - "Хрустящий, почти стеклянный перезвон метанового инея, осыпающегося с острых пиков в вечных сумерках…"
      - "Глухое, ритмичное постукивание: криовулканы выбрасывают замёрзшую лаву, застывающую ещё в полёте…"
      - "Ускользающий, призрачный шёпот приливных сил между Плутоном и Хароном, запертых в вечном гравитационном танце…"
      - "Мерный, потрескивающий треск электризации от столкновения пылинок в тончайшей дымке атмосферы…"
      - "Протяжный, заунывный свист солнечного ветра, почти потерявшего силу на границе межзвёздного пространства…"
      - "Звенящая, кристальная тишина азотных ледников, нарушаемая лишь падением одинокой застывшей частицы…"
      - "Сквозь шорох инея и свист ветра вдруг проступает искажённый, словно из глубин пояса Койпера, шёпот: «мы помним, каково это — быть девятой…»…"
      - "Вечная, вневременная тишина карликового мира, где звук почти исчезает, оставляя лишь память о свете далёкого Солнца…"

  ASTEROID:
    name: "Астероид"
    messages:
      - "Мерный, сухой перестук щебня в вечной тьме — миллионы осколков главного пояса трутся гранями на границе пустоты…"
      - "Прерывистое, ледяное шипение сублимирующих газов, вырывающихся из недр древнего углистого хондрита…"
      - "Глухой, вибрирующий гул — астероид медленно вращается, и его железные жилы поют под ударами микрометеоритов…"
      - "Внезапный резкий треск, гаснущий без эха: столкновение с крошечной частицей на полной скорости — и снова ничто…"

  TRANSMITTER:
    name: "Древний Передатчик"
    encrypted: true
    value_bonus: 15
    # rare_chance: 250 означает 1 шанс из 250 при каждом случайном выборе
    rare_chance: 250
    messages:
      - "Шёпот помех,глуховатый стук и среди них слышна фраза:'Земляне! Мы марсиане!'"
      - "Сквозь белый шум доносится механический голос: «протокол эвакуации завершён. выживших: ноль»…"
      - "Медленный, ритмичный стук, будто кто-то пытается достучаться из глубины пустоты…"
      - "Искажённый шёпот повторяет одну и ту же фразу: «не открывайте северные врата…»…"
      - "Среди хаотичных помех вдруг возникает идеально чистый сигнал: «мы всё ещё здесь»…"
      - "Глухое потрескивание переходит в древнюю мелодию, звучащую так, будто запись старше самой цивилизации…"
      - "Тишина длится почти минуту, после чего тихий голос спрашивает: «это Земля?..»…"
      - "Резкий всплеск радиационных помех сопровождается сообщением: «цикл начинается снова»…"
      - "Среди помех внезапно возникает детский голос: «мы видим тебя через антенну…»…"
      - "Сквозь треск эфира слышится тяжёлое дыхание, будто кто-то стоит вплотную к микрофону по другую сторону пустоты…"
      - "Короткая вспышка помех сопровождается фразой: «мы нашли вас не первыми»…"
      - "На фоне слабого гула слышно, как кто-то медленно считает в обратном порядке, но пропускает некоторые числа…"
      - "Передача длится ровно одиннадцать секунд. Всё это время в эфире слышен только плач ребёнка…"
      - "В эфире возникает абсолютная тишина — настолько глубокая, что начинает звенеть в ушах…"
      - "Сквозь треск и помехи прорывается фраза: «объект понял, что за ним наблюдают»…"
      - "Глухое, едва различимое гудение — будто огромный механизм продолжает работать где-то очень далеко…"
      - "Древний передатчик испускает ровный несущий сигнал, не меняющий частоту уже неизвестно сколько времени…"
      - "Передача идёт без остановки, но ни один фрагмент сигнала никогда не повторяется полностью…"
      - "Сигнал внезапно обрывается, а затем тот же голос спрашивает: «почему ты всё ещё слушаешь нас?»…"
      - "Сквозь белый шум слышится далёкий хор, медленно повторяющий одно и то же неизвестное слово…"
      - "Из динамиков раздаётся серия щелчков, а затем спокойный голос сообщает: «обнаружен ещё один живой оператор»…"
